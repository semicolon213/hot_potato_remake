[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # VITE_* 변수는 Vite가 빌드 시 클라이언트 번들에 포함하므로, Smart Detection 비활성화
  # (Google Client ID, Apps Script URL 등은 클라이언트에 공개되는 값임)
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Netlify Functions 설정 (배포 시 Apps Script 프록시)
[functions]
  directory = "netlify/functions"
  # 환경변수: Netlify 대시보드에서 VITE_APP_SCRIPT_URL 또는 APP_SCRIPT_URL 설정

# netlify dev: 로컬에서 개발+Vite 프록시 테스트 (apiClient는 /api 사용)
# - 프론트: Vite dev 서버 (import.meta.env.DEV=true → /api)
# - /api: Vite proxy가 Apps Script로 전달
[dev]
  command = "npm run dev:web"
  port = 8888
  targetPort = 5173

# 정책 페이지 짧은 URL (선택)
[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 301

# SPA 라우팅 — dist에 존재하는 파일(privacy.html 등)은 이 규칙보다 먼저 제공됨
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

